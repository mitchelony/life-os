services:
  - type: web
    name: life-os-api
    runtime: python
    plan: starter
    rootDir: apps/api
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEFAULT_CURRENCY
        value: USD
      - key: AUTH_STRATEGY
        value: supabase
      - key: ALLOW_DEV_LOGIN
        value: false
      - key: SUPABASE_AUTH_USER_PATH
        value: /auth/v1/user
      - key: DEV_OWNER_TOKEN
        value: disabled-in-production
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
